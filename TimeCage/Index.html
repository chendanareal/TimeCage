    <!-- WebView2 与 C++ 框架交互核心模块 - 通用模板 -->
    <!-- 功能说明：处理 WebView2 网页与桌面应用程序之间的双向通信 -->
    <!-- 使用方法：复制此代码段到您的 HTML 文件头部，然后按照注释说明扩展 -->
    <!-- =============================================================== -->
    <script>
        /**
         * @fileoverview WebView2 交互核心模块
         * @description 此模块提供了 WebView2 网页与 C++ 桌面程序之间的双向通信功能
         * 包含命令定义、消息发送、消息接收处理等功能
         * @version 1.0
         */

        // ===============================================================
        // 1. 命令常量定义区
        // ===============================================================
        /**
         * WebView 通信命令常量
         * 说明：定义所有在 C++ 和 JS 之间传递的命令名称
         * 命名规则：WebViewCmd_命令名称
         */
        const WebViewCmd = {
            None: "WebViewCmd_None",
            ShowMessageBox: "WebViewCmd_ShowMessageBox",                // 显示提示框
            SetAppName: "WebViewCmd_SetAppName",                        // 设置标题栏文本
            SetShortCutButtonInfo: "WebViewCmd_SetShortCutButtonInfo",  // 设置快捷按钮信息
            FreezeGame: "WebViewCmd_FreezeGame",                        // 冻结游戏
            ThawGame: "WebViewCmd_ThawGame",                            // 解冻游戏
            ToggleOption: "WebViewCmd_ToggleOption",                    // 切换选项
            SysClose: "WebViewCmd_SysClose",                            // 退出程序
            SysMinimize: "WebViewCmd_SysMinimize"                       // 最小化窗口
        };

        // ===============================================================
        // 2. 消息接收与处理区（C++ → JS）
        // ===============================================================
        /**
         * 接收来自 C++ 的 JSON 消息
         * @param {string} jsonStringFromCpp - C++ 发送的 JSON 字符串
         * @description 这是 C++ 代码调用的入口函数，请勿重命名
         */
        function onReceiveCppJson(jsonStringFromCpp) {
            try {
                let data = JSON.parse(jsonStringFromCpp);

                // 根据命令类型分发到对应的处理函数
                if (WebViewCmd.SetAppName == data.cmd) {
                    processWebViewCmd_SetAppName(data.param1);
                }
                else if (WebViewCmd.SetShortCutButtonInfo == data.cmd) {
                    processWebViewCmd_SetShortCutButtonInfo(parseInt(data.param1), data.param2, data.param3, parseInt(data.param4));
                }
                else if (WebViewCmd.ShowMessageBox == data.cmd) {
                    processWebViewCmd_ShowMessageBox(data.param1);
                }
                else if (WebViewCmd.FreezeGame == data.cmd) {
                    processWebViewCmd_FreezeGame(parseInt(data.param1));
                }
                else if (WebViewCmd.ThawGame == data.cmd) {
                    processWebViewCmd_ThawGame(parseInt(data.param1));
                }

            } catch (error) {
                console.error("网页解析来自 C++ 的数据失败:", error);
            }
        }

        // ===============================================================
        // 3. 消息发送区（JS → C++）
        // ===============================================================
        /**
         * 创建命令 JSON 字符串
         * @param {string} cmd - 命令名称
         * @param {string} param1 - 参数1（可选）
         * @param {string} param2 - 参数2（可选）
         * @param {string} param3 - 参数3（可选）
         * @param {string} param4 - 参数4（可选）
         * @returns {string} JSON 字符串
         */
        function createCmdString(cmd, param1, param2, param3, param4) {
            let msgObject = {
                cmd: cmd,
                param1: param1,
                param2: param2,
                param3: param3,
                param4: param4
            };
            return JSON.stringify(msgObject);
        }

        /**
         * 发送命令给 C++ 框架
         * @param {string} cmdStr - 命令 JSON 字符串
         */
        function sendWebViewCmd(cmdStr) {
            if (window.chrome && window.chrome.webview) {
                window.chrome.webview.postMessage(cmdStr);
            }
        }

        // ===============================================================
        // 4. 发送命令的快捷函数区（JS → C++）
        // ===============================================================
        /** 发送设置快捷按钮信息的命令 */
        function sendWebViewCmd_SetShortCutButtonInfo(buttonIndex, processName, comment, iconIndex) {
            sendWebViewCmd(createCmdString(WebViewCmd.SetShortCutButtonInfo, String(buttonIndex), processName, comment, String(iconIndex)));
        }

        /** 发送冻结游戏的命令 */
        function sendWebViewCmd_FreezeGame(index) {
            sendWebViewCmd(createCmdString(WebViewCmd.FreezeGame, String(index), '', '', ''));
        }

        /** 发送解冻游戏的命令 */
        function sendWebViewCmd_ThawGame(index) {
            sendWebViewCmd(createCmdString(WebViewCmd.ThawGame, String(index), '', '', ''));
        }

        /** 发送切换选项的命令 */
        function sendWebViewCmd_ToggleOption(option) {
            sendWebViewCmd(createCmdString(WebViewCmd.ToggleOption, option, '', '', ''));
        }

        /** 发送退出程序的命令 */
        function sendWebViewCmd_SysQuit() {
            sendWebViewCmd(createCmdString(WebViewCmd.SysClose, '', '', '', ''));
        }

        /** 发送最小化窗口的命令 */
        function sendWebViewCmd_SysMinimize() {
            sendWebViewCmd(createCmdString(WebViewCmd.SysMinimize, '', '', '', ''));
        }

        // ===============================================================
        // 5. 处理 C++ 命令的具体实现区（C++ → JS）
        // ===============================================================
        /** 处理设置标题栏文本的命令 */
        function processWebViewCmd_SetAppName(appName) {
            document.getElementById("captionLabel").innerText = appName;
        }

        /** 处理设置快捷按钮信息的命令 */
        function processWebViewCmd_SetShortCutButtonInfo(index, processName, comment, iconIndex) {
            changeShortcutButtonInfo(index, processName, comment, iconIndex);
        }

        /** 处理显示提示框的命令 */
        function processWebViewCmd_ShowMessageBox(tip) {
            showAlertModal(tip);
        }

        /** 处理冻结游戏的命令 */
        function processWebViewCmd_FreezeGame(index) {
            setGameFrozen(index, true);
        }

        /** 处理解冻游戏的命令 */
        function processWebViewCmd_ThawGame(index) {
            setGameFrozen(index, false);
        }

        // ===============================================================
        // 扩展说明：
        // 1. 如果需要新增通信命令，请先在 WebViewCmd 中添加常量
        // 2. 然后在 processWebViewCmd_ 系列函数中添加处理逻辑
        // 3. 如需发送新命令给 C++，请添加 sendWebViewCmd_ 系列函数
        // ===============================================================
    </script>
    <!-- =============================================================== -->
    <!-- WebView2 核心模块结束 -->

        // 创建SVG元素
        function createSvgElement(svgHtml) {
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = svgHtml;
            const svg = tempDiv.querySelector('svg');
            if (svg) {
                svg.setAttribute('width', '100%');
                svg.setAttribute('height', '100%');
            }
            return svg;
        }

        // 初始化游戏卡片图标
        function initializeGameIcons() {
            gameCards.forEach((card) => {
                // 默认使用第一个图标（游戏手柄）
                const iconIndex = 0;
                card.dataset.iconIndex = iconIndex;
                const iconElement = card.querySelector('.game-icon');
                if (iconElement) {
                    iconElement.innerHTML = '';
                    const iconWrapper = document.createElement('span');
                    iconWrapper.className = 'game-icon-svg';
                    // 第一个图标是emoji，直接设置innerHTML
                    iconWrapper.innerHTML = iconSvgs[iconIndex];
                    iconElement.appendChild(iconWrapper);
                }
            });
        }

        // 渲染图标选择器
        function renderIconSelector() {
            const selector = document.getElementById('iconSelector');
            selector.innerHTML = '';

            iconSvgs.forEach((iconContent, index) => {
                const option = document.createElement('div');
                option.className = 'icon-option' + (index === selectedIconIndex ? ' selected' : '');

                // 只对索引0的图标进行特殊处理（选择器中显示20px大小）
                if (iconContent.includes('<svg')) {
                    const svg = createSvgElement(iconContent);
                    if (svg) {
                        option.appendChild(svg);
                    }
                } else {
                    // 其他emoji图标直接显示
                    option.innerHTML = iconContent;
                }

                option.onclick = () => selectIcon(index);
                selector.appendChild(option);
            });
        }

        // 选择图标
        function selectIcon(index) {
            selectedIconIndex = index;

            // 更新选择状态
            const options = document.querySelectorAll('.icon-option');
            options.forEach((opt, i) => {
                opt.classList.toggle('selected', i === index);
            });
        }

        // 新增：显示提示框函数
        function showAlertModal(message) {
            // 设置提示文本
            document.getElementById('alertMessageText').textContent = message || '操作成功';
            // 显示提示框
            alertModal.classList.add('active');
        }

        // 新增：关闭提示框函数
        function closeAlertModal() {
            alertModal.classList.remove('active');
        }

        // 点击提示框遮罩层关闭
        alertModal.addEventListener('click', function (e) {
            if (e.target === alertModal) {
                closeAlertModal();
            }
        });

        function selectGame() {
            // 移除所有卡片的active状态
            gameCards.forEach(card => card.classList.remove('active'));
            // 给当前点击的卡片添加active状态
            event.currentTarget.classList.add('active');
            // 更新当前选中的卡片
            activeGameCard = event.currentTarget;
        }

        function setGameFrozen(buttonIndex, isFrozen) {
            if (buttonIndex < 0 || buttonIndex >= gameCards.length) {
                console.error(`按钮序号 ${buttonIndex} 无效，范围应为 0-${gameCards.length - 1}`);
                return;
            }

            const targetCard = gameCards[buttonIndex];
            if (isFrozen) {
                targetCard.classList.add('frozen');
            } else {
                targetCard.classList.remove('frozen');
            }

            console.log(`按钮 ${buttonIndex} 冻结状态: ${isFrozen}`);
        }

        function freezeGame() {
            const activeCard = document.querySelector('.game-card.active');
            if (activeCard && activeCard.classList.contains('frozen')) {
                console.log('该游戏已经在冻结状态，无需重复冻结');
                return;
            }
            sendWebViewCmd_FreezeGame(getActiveGameNumber() - 1);
        }

        function thawGame() {
            sendWebViewCmd_ThawGame(getActiveGameNumber() - 1);
        }

        function toggleOption(optionName) {
            const checkbox = document.getElementById(`${optionName}Checkbox`);

            checkbox.classList.toggle('checked');
            checkbox.classList.toggle('unchecked');

            const isEnabled = checkbox.classList.contains('checked');
            console.log(`${optionName} enabled: ${isEnabled}`);

            sendWebViewCmd_ToggleOption(optionName);
        }


        // 新增弹窗相关函数
        function editShortcuts() {
            // 检查是否有选中的卡片
            if (!activeGameCard) {
                alert('请先选择一个要编辑的快捷按钮！');
                return;
            }

            // 获取当前选中卡片的现有文本和图标
            const currentName = activeGameCard.querySelector('.game-name').textContent.trim();
            const currentDesc = activeGameCard.querySelector('.game-name-en').textContent.trim().replace(/[()]/g, '');
            const currentIconIndex = activeGameCard.dataset.iconIndex ? parseInt(activeGameCard.dataset.iconIndex) : 0;
            selectedIconIndex = currentIconIndex;

            // 填充到输入框并显示弹窗
            document.getElementById('processNameInput').value = currentDesc;
            document.getElementById('processDescInput').value = currentName;

            // 渲染并显示图标选择器
            renderIconSelector();
            editModal.classList.add('active');
        }

        function closeEditModal() {
            editModal.classList.remove('active');
        }

        // 获取当前激活按钮的显示序号
        function getActiveGameNumber() {
            // 找到当前激活的game-card
            const activeCard = document.querySelector('.game-card.active');
            if (!activeCard) return null;

            // 提取序号文本并转为数字
            const numberElement = activeCard.querySelector('.game-number');
            const number = numberElement ? parseInt(numberElement.textContent.trim()) : null;

            return number;
        }


        function confirmEditShortcut() {
            // 检查是否有选中的卡片
            if (!activeGameCard) {
                alert('请先选择一个要编辑的快捷按钮！');
                closeEditModal();
                return;
            }

            const processName = document.getElementById('processNameInput').value.trim();
            const processDesc = document.getElementById('processDescInput').value.trim();

            // 更新选中卡片的显示文本和图标
            activeGameCard.querySelector('.game-name').textContent = processDesc;
            activeGameCard.querySelector('.game-name-en').textContent = processName ? `(${processName})` : '';
            activeGameCard.dataset.iconIndex = selectedIconIndex;

            // 更新卡片图标
            const iconElement = activeGameCard.querySelector('.game-icon');
            if (iconElement) {
                const iconWrapper = iconElement.querySelector('.game-icon-svg');
                if (iconWrapper) {
                    // 更新现有图标
                    const iconContent = iconSvgs[selectedIconIndex];
                    if (iconContent.includes('<svg')) {
                        iconWrapper.innerHTML = '';
                        const svg = createSvgElement(iconContent);
                        if (svg) {
                            iconWrapper.appendChild(svg);
                        }
                    } else {
                        // emoji图标直接设置innerHTML
                        iconWrapper.innerHTML = iconContent;
                    }
                } else {
                    // 如果没有图标包装器，创建一个
                    const newIconWrapper = document.createElement('span');
                    newIconWrapper.className = 'game-icon-svg';
                    const iconContent = iconSvgs[selectedIconIndex];
                    if (iconContent.includes('<svg')) {
                        const svg = createSvgElement(iconContent);
                        if (svg) {
                            newIconWrapper.appendChild(svg);
                        }
                    } else {
                        // emoji图标直接设置innerHTML
                        newIconWrapper.innerHTML = iconContent;
                    }
                    iconElement.innerHTML = '';
                    iconElement.appendChild(newIconWrapper);
                }
            }

            console.log('编辑快捷按钮成功:', {
                进程名: processName,
                描述: processDesc,
                图标索引: selectedIconIndex
            });

            closeEditModal();

            sendWebViewCmd_SetShortCutButtonInfo(getActiveGameNumber() - 1, processName, processDesc, selectedIconIndex);
        }

        // 通过索引修改指定快捷按钮信息的函数
        function changeShortcutButtonInfo(index, processName, comment, iconIndex) {
            // 验证索引有效性
            if (index < 0 || index >= gameCards.length) {
                console.error(`索引 ${index} 超出范围，当前只有 ${gameCards.length} 个快捷按钮`);
                alert(`索引无效！当前只有 ${gameCards.length} 个快捷按钮`);
                return;
            }


            // 获取指定索引的卡片
            const targetCard = gameCards[index];
            // 清理输入参数的首尾空格
            const cleanProcessName = processName.trim();

            // 解析comment，分离描述和图标索引（格式：描述|图标索引）
            let cleanComment = comment ? comment.trim() : '';

            // 更新卡片显示信息
            targetCard.querySelector('.game-name').textContent = cleanComment;
            targetCard.querySelector('.game-name-en').textContent = cleanProcessName ? `(${cleanProcessName})` : '';
            targetCard.dataset.iconIndex = iconIndex;

            // 更新图标
            const iconElement = targetCard.querySelector('.game-icon');
            if (iconElement) {
                const iconWrapper = iconElement.querySelector('.game-icon-svg');
                if (iconWrapper) {
                    // 更新现有图标
                    const iconContent = iconSvgs[iconIndex];
                    if (iconContent.includes('<svg')) {
                        iconWrapper.innerHTML = '';
                        const svg = createSvgElement(iconContent);
                        if (svg) {
                            iconWrapper.appendChild(svg);
                        }
                    } else {
                        // emoji图标直接设置innerHTML
                        iconWrapper.innerHTML = iconContent;
                    }
                } else {
                    // 如果没有图标包装器，创建一个
                    const newIconWrapper = document.createElement('span');
                    newIconWrapper.className = 'game-icon-svg';
                    const iconContent = iconSvgs[iconIndex];
                    if (iconContent.includes('<svg')) {
                        const svg = createSvgElement(iconContent);
                        if (svg) {
                            newIconWrapper.appendChild(svg);
                        }
                    } else {
                        // emoji图标直接设置innerHTML
                        newIconWrapper.innerHTML = iconContent;
                    }
                    iconElement.innerHTML = '';
                    iconElement.appendChild(newIconWrapper);
                }
            }

            console.log(`成功修改索引 ${index} 的快捷按钮信息:`, {
                进程名: cleanProcessName,
                描述: cleanComment,
                图标索引: iconIndex
            });
        }

        // 初始化标题栏图标
        function initializeTitleIcon() {
            const titleIcon = document.getElementById('titleIcon');
            if (titleIcon && iconSvgs.length > 0) {
                const iconContent = iconSvgs[0];
                if (iconContent.includes('<svg')) {
                    const svg = createSvgElement(iconContent);
                    if (svg) {
                        titleIcon.innerHTML = '';
                        titleIcon.appendChild(svg);
                    }
                } else {
                    titleIcon.innerHTML = iconContent;
                }
            }
        }

        // 页面加载完成后初始化
        window.addEventListener('DOMContentLoaded', () => {
            initializeGameIcons();
            initializeTitleIcon();
        });

        // 点击弹窗外部关闭
        editModal.addEventListener('click', function (e) {
            if (e.target === editModal) {
                closeEditModal();
            }
        });
    </script>
</body>
</html>
